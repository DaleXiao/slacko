name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p dist
          TARGETS="darwin/arm64 windows/amd64 windows/arm64"
          for target in $TARGETS; do
            os="${target%/*}"
            arch="${target#*/}"
            output="slackogo-${os}-${arch}"
            [ "$os" = "windows" ] && output="${output}.exe"
            echo "Building ${output}..."
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/${output}" ./cmd/slackogo/
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
